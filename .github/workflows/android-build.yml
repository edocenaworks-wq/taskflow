name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build web app
        run: npm run build
        
      - name: Sync Capacitor
        run: |
          npm run build
          npx cap sync android
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Build APK
        run: |
          # Se la cartella android manca o è incompleta, la rigeneriamo
          if [ ! -d "android" ] || [ ! -f "android/gradlew" ]; then
            echo "Cartella Android mancante o incompleta. Rigenerazione in corso..."
            rm -rf android
            npx cap add android
          fi
          
          # Sincronizziamo i file web e i plugin
          npx cap sync android
          
          # Entriamo nella cartella e compiliamo
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        
      - name: Sign APK
        id: sign_app
        run: |
          # Decodifica il keystore dai segreti
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          
          # Trova gli strumenti di build più recenti (zipalign e apksigner)
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Using build tools from: $BUILD_TOOLS_PATH"
          
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          SIGNED_APK_PATH="android/app/build/outputs/apk/release/app-release-signed.apk"
          
          # Allineamento dell'APK (Zipalign)
          $BUILD_TOOLS_PATH/zipalign -v 4 $APK_PATH $SIGNED_APK_PATH
          
          # Firma dell'APK (Apksigner)
          $BUILD_TOOLS_PATH/apksigner sign --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out $SIGNED_APK_PATH $SIGNED_APK_PATH
            
          # Esporta il percorso per lo step successivo
          echo "signedReleaseFile=$SIGNED_APK_PATH" >> $GITHUB_OUTPUT
          
      - name: Automatic Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: "latest"
          prerelease: false
          title: "Latest Build"
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
